<body>

<script>
// ============================================================
// 小袥袨袙袗袪鞋
// ============================================================
const DICT = new Map([
    // 袦械褋褌芯懈屑械薪懈褟
    ['褟', ['屑盲','pron']], ['褌褘', ['褌盲','pron']], ['芯薪', ['褕懈','pron']],
    ['芯薪邪', ['褕懈','pron']], ['屑褘', ['盲屑盲','pron']], ['胁褘', ['褌盲屑盲','pron']],
    ['芯薪懈', ['褕盲','pron']], ['屑械薪褟', ['屑盲薪盲','pron']], ['褌械斜褟', ['褌盲薪盲','pron']],
    ['械谐芯', ['褕盲薪盲','pron']], ['屑薪械', ['屑盲薪盲','pron']], ['褌械斜械', ['褌盲薪盲','pron']],
    ['械屑褍', ['褕盲薪盲','pron']], ['薪邪屑', ['盲屑膩薪盲','pron']], ['胁邪屑', ['褌盲屑膩薪盲','pron']],
    ['懈屑', ['褕膩薪盲','pron']],

    // 袩褉械写谢芯谐懈
    ['胁', ['-盲','prep']], ['薪邪', ['-盲薪邪','prep']], ['褋', ['-泻邪','prep']],
    ['泻', ['-薪盲','prep']], ['写谢褟', ['-薪盲','prep']],

    // 袙芯锌褉芯褋褘
    ['泻褌芯', ['褔樱','ques']], ['褔褌芯', ['褑樱','ques']], ['谐写械', ['泻褍褉盲','ques']],

    // 袚谢邪谐芯谢褘
    ['斜褘褌褜', ['邪褏','verb']], ['械褋褌褜', ['盲褕褌盲','verb']],
    ['写械谢邪褌褜', ['泻邪褉','verb']], ['褋写械谢邪褌褜', ['泻邪褉','verb']],
    ['谐芯胁芯褉懈褌褜', ['胁膩褌','verb']], ['褋泻邪蟹邪褌褜', ['胁膩褌','verb']],
    ['懈写褌懈', ['写蟹膩','verb']], ['锌褉懈泄褌懈', ['写蟹膩','verb']],
    ['薪械褋褌懈', ['斜邪褉','verb']], ['胁械蟹褌懈', ['斜邪褉','verb']],
    ['写邪胁邪褌褜', ['锌懈屑','verb']], ['写邪褌褜', ['锌懈屑','verb']],
    ['胁懈写械褌褜', ['写褉樱胁','verb']], ['蟹薪邪褌褜', ['蟹膩薪','verb']],
    ['谢褞斜懈褌褜', ['泻邪虅屑','verb']], ['褔懈褌邪褌褜', ['褏胁邪褉','verb']],
    ['卸懈褌褜', ['写卸樱胁','verb']], ['褉邪斜芯褌邪褌褜', ['泻邪褉','verb']],
    ['褋褌褉芯懈褌褜', ['泻邪褉','verb']], ['褋懈写械褌褜', ['薪懈褕懈写','verb']],

    // 小褍褖械褋褌胁懈褌械谢褜薪褘械
    ['褔械谢芯胁械泻', ['写邪褏邪','noun']], ['谢褞写懈', ['写邪褏膩薪','noun']],
    ['写芯屑', ['写盲屑台','noun']], ['胁芯泄褋泻芯', ['褏樱薪盲','noun']],
    ['邪褉屑懈褟', ['泻盈薪邪','noun']], ['胁芯写邪', ['盈褉','noun']],
    ['屑懈褉', ['泄褋邪屑斜邪褋褌盲','noun']], ['薪械斜芯', ['邪褋屑膩薪','noun']],
    ['蟹械屑谢褟', ['褔邪褉盲','noun']], ['芯谐芯薪褜', ['膩褌盲褉','noun']],
    ['泻薪褟蟹褜', ['泻盲薪盲蟹盲','noun']], ['褑邪褉褜', ['褏胁膩屑台','noun']],
    ['褏邪薪', ['褏膩薪邪','noun']], ['泻邪蟹邪泻', ['泻邪蟹膩泻','noun']],
    ['锌芯锌', ['锌膩锌','noun']], ['胁褉邪谐', ['写褍褕屑邪薪','noun']],
    ['胁谢邪褋褌褜', ['胁膩褌','noun']], ['薪邪褉芯写', ['写邪褏邪','noun']],
    ['褋芯胁械褌', ['褋邪胁泄械褌','noun']], ['褋芯褞蟹', ['褋邪泄褍蟹','noun']],
    ['褉械褋锌褍斜谢懈泻邪', ['褉泄械褋锌褍斜谢懈泻盲','noun']],
    ['褌芯胁邪褉', ['褌邪胁膩褉','noun']], ['写械薪褜谐懈', ['写械薪谐膩','noun']],
    ['褏谢械斜', ['褏谢樱斜','noun']], ['屑褟褋芯', ['屑泄邪褋膩','noun']],
    ['胁懈薪芯', ['胁樱薪膩','noun']], ['泻薪懈谐邪', ['泻薪樱谐膩','noun']],
    ['泻芯薪褜', ['屑褍褉樱','noun']], ['谐芯褉芯写', ['写卸樱屑台','noun']],
    ['芯褋褌褉芯谐', ['邪褋褌褉膩谐盲','noun']], ['泻褉械锌芯褋褌褜', ['泻褉樱锌盲褋褌盲','noun']],
    ['锌懈褖邪谢褜', ['锌懈褕褔膩谢','noun']], ['锌褍褕泻邪', ['锌褍褕泻膩','noun']],
    ['褋邪斜谢褟', ['褋邪斜谢泄膩','noun']], ['屑械褔', ['泻泄盲屑台','noun']],
    ['斜芯谐', ['斜膩谐','noun']], ['泻褉械褋褌', ['泻褉懈褋褌盲','noun']],
    ['褉械泻邪', ['褉樱泻膩','noun']], ['谢械褋', ['谢樱褋','noun']],
    ['褋褌械锌褜', ['褏盲褉盲','noun']], ['褞褉褌邪', ['谐械褉盲','noun']],
    ['写芯褉芯谐邪', ['写邪褉膩谐膩','noun']],

    // 小谢芯卸薪褘械 褋谢芯胁邪
    ['薪邪褉芯写芯胁谢邪褋褌懈械', ['写邪褏膩胁膩褌','noun']],
    ['屑邪褋褋芯胁谢邪褋褌懈械', ['写邪褏膩薪胁膩褌','noun']],
    ['褋褋褋褉', ['小膩褋膩褉','noun']],

    // 袩褉懈谢邪谐邪褌械谢褜薪褘械
    ['胁械褋褜', ['胁懈褋锌盲','adj']], ['胁褋褟', ['胁懈褋锌盲','adj']],
    ['褏芯褉芯褕懈泄', ['褋褍','adj']], ['斜芯谢褜褕芯泄', ['斜褍谢盲薪写','adj']],
    ['泻褉邪褋薪褘泄', ['褏樱薪褗','adj']], ['褔褢褉薪褘泄', ['褏邪褉邪','adj']],
    ['褋芯胁械褌褋泻懈泄', ['褋邪胁泄械褌褋泻樱','adj']],

    // 效邪褋褌懈褑褘
    ['薪械', ['薪懈','particle']], ['懈', ['胁邪','particle']],
    ['薪械褌', ['薪懈','particle']],
]);

// 袩邪写械卸懈
const CASES = { nom: '', gen: '-薪盲', dat: '-薪盲', acc: '', ins: '-盲薪邪', loc: '-盲', com: '-泻邪' };
const PLURAL_SUFFIX = '膩薪';

// 袨泻芯薪褔邪薪懈褟 谐谢邪谐芯谢芯胁
const VERB_END = {
    pres: { '1sg':'盲屑', '2sg':'盲褕懈', '3sg':'盲褌盲', '1pl':'盲屑邪薪', '2pl':'盲褕盲', '3pl':'盲薪写盲' },
    past: { '1sg':'盲屑台', '2sg':'盲褕', '3sg':'盲', '1pl':'盲屑邪薪台', '2pl':'盲褕盲薪台', '3pl':'盲薪写' },
    imp:  { 'sg':'', 'pl':'盲褕盲' },
};

// ============================================================
// 袩袝袪袝袙袨袛效袠袣
// ============================================================
function lookup(word) {
    const w = word.toLowerCase().replace(/[.,!?;:]/g, '');
    return DICT.get(w) || null;
}

function isPlural(word) {
    const w = word.toLowerCase();
    return /(褘|懈|芯胁|械胁|邪屑懈|褟屑懈|邪褏|褟褏)$/.test(w);
}

function applyCase(word, caseName) {
    const ending = CASES[caseName] || '';
    if (!ending) return word;
    if (/[邪盲膩懈樱褍盈]$/.test(word)) return word + ending.replace('-', '');
    return word + ending;
}

function applyPlural(word) {
    return word + PLURAL_SUFFIX;
}

function conjugateVerb(base, tense, person) {
    const endings = VERB_END[tense] || VERB_END['pres'];
    let ending = endings[person] || '盲褌盲';
    if (/[邪盲懈褍膩樱盈]$/.test(base)) ending = ending.replace(/^盲/, '');
    return base + ending;
}

function translit(word) {
    const map = {
        '邪':'邪','芯':'邪','械':'泄械','褢':'泄芯','懈':'懈','褘':'褘','褍':'褍','褞':'泄褍','褟':'泄邪','褝':'褝',
        '斜':'斜','胁':'胁','谐':'谐','写':'写','卸':'卸','蟹':'蟹','泻':'泻','谢':'谢','屑':'屑','薪':'薪',
        '锌':'锌','褉':'褉','褋':'褋','褌':'褌','褎':'褎','褏':'褏','褑':'褑','褔':'褔','褕':'褕','褖':'褕褔',
        '褜':'','褗':'',
    };
    let w = word.toLowerCase();
    let res = '';
    for (const c of w) res += map[c] || c;
    if (res && !/[邪械褢懈芯褍褘褝褞褟盲膩樱盈]$/.test(res)) res += '盲';
    return res;
}

function translate(text) {
    const words = text.trim().split(/\s+/);
    if (!words.length || (words.length === 1 && !words[0])) return '';

    const tokens = [];
    for (const raw of words) {
        const clean = raw.replace(/[.,!?;:]/g, '');
        const found = lookup(clean);
        tokens.push({
            raw, clean,
            saka: found ? found[0] : translit(clean),
            type: found ? found[1] : 'unknown',
            plural: isPlural(clean),
        });
    }

    let subject = null, verb = null, verbTense = 'pres', verbPerson = '3sg';
    const objects = [], locations = [];
    let negate = false, verbIndex = -1;

    for (let i = 0; i < tokens.length; i++) {
        if (tokens[i].type === 'verb') {
            verbIndex = i;
            verb = tokens[i].saka;
            const w = tokens[i].clean;
            if (/[谢][邪芯懈]?$/.test(w) || w.endsWith('谢')) verbTense = 'past';
            if (w.endsWith('褞') || w.endsWith('褍')) verbPerson = '1sg';
            else if (w.endsWith('械褕褜') || w.endsWith('懈褕褜')) verbPerson = '2sg';
            else if (w.endsWith('械褌') || w.endsWith('懈褌')) verbPerson = '3sg';
            else if (w.endsWith('械屑') || w.endsWith('懈屑')) verbPerson = '1pl';
            else if (w.endsWith('械褌械') || w.endsWith('懈褌械')) verbPerson = '2pl';
            else if (w.endsWith('褞褌') || w.endsWith('褍褌') || w.endsWith('褟褌') || w.endsWith('邪褌')) verbPerson = '3pl';
            break;
        }
    }

    for (let i = 0; i < tokens.length; i++) {
        const t = tokens[i];
        if (t.type === 'particle' && t.clean === '薪械') { negate = true; continue; }
        if (t.type === 'prep') continue;
        if (i === verbIndex || t.type === 'verb') continue;

        const prevType = i > 0 ? tokens[i-1].type : null;
        if (prevType === 'prep') {
            const prep = tokens[i-1].clean;
            const prepCase = (prep === '胁' || prep === '薪邪') ? 'loc' :
                             (prep === '褋') ? 'com' : 'dat';
            let w = applyCase(t.saka, prepCase);
            if (t.plural) w = applyPlural(w);
            locations.push(w);
            continue;
        }

        if (subject === null && t.type !== 'ques') {
            subject = t.saka;
            if (t.plural) subject = applyPlural(subject);
            continue;
        }

        if (t.type === 'ques') {
            if (subject === null) subject = t.saka;
            else objects.unshift(t.saka);
            continue;
        }

        let obj = t.saka;
        if (t.plural) obj = applyPlural(obj);
        objects.push(obj);
    }

    const result = [];
    if (subject) result.push(subject);
    result.push(...locations);
    if (objects.length > 1) {
        for (let i = 0; i < objects.length - 1; i++) {
            result.push(applyCase(objects[i], 'dat'));
        }
    }
    if (objects.length > 0) result.push(objects[objects.length - 1]);
    if (negate) result.push('薪懈');
    if (verb) result.push(conjugateVerb(verb, verbTense, verbPerson));

    return result.join(' ');
}

// ============================================================
// 袠袧孝袝袪肖袝袡小
// ============================================================
function translateText() {
    const input = document.getElementById('input').value;
    const output = document.getElementById('output');
    if (!input.trim()) { output.textContent = ''; return; }
    output.textContent = translate(input);
}

function copyOutput() {
    const text = document.getElementById('output').textContent;
    if (text) navigator.clipboard.writeText(text).then(() => {
        document.getElementById('status').textContent = '小泻芯锌懈褉芯胁邪薪芯!';
        setTimeout(() => updateStatus(), 1500);
    });
}

function clearAll() {
    document.getElementById('input').value = '';
    document.getElementById('output').textContent = '';
}

function showAddDialog() {
    document.getElementById('addDialog').style.display = 'flex';
    document.getElementById('addRus').focus();
}

function closeAddDialog() {
    document.getElementById('addDialog').style.display = 'none';
}

function addWord() {
    const rus = document.getElementById('addRus').value.trim().toLowerCase();
    const skif = document.getElementById('addSkif').value.trim();
    const type = document.getElementById('addType').value;
    if (rus && skif) {
        DICT.set(rus, [skif, type]);
        localStorage.setItem('skifo_user_dict', JSON.stringify([...DICT]));
        updateStatus();
        closeAddDialog();
    }
}

function updateStatus() {
    document.getElementById('status').textContent = `小谢芯胁 胁 褋谢芯胁邪褉械: ${DICT.size}`;
}

// 袟邪谐褉褍蟹泻邪 锌芯谢褜蟹芯胁邪褌械谢褜褋泻芯谐芯 褋谢芯胁邪褉褟
try {
    const saved = localStorage.getItem('skifo_user_dict');
    if (saved) {
        const arr = JSON.parse(saved);
        for (const [k, v] of arr) {
            if (!DICT.has(k)) DICT.set(k, v);
        }
    }
} catch(e) {}

// 袞懈胁芯泄 锌械褉械胁芯写 锌褉懈 胁胁芯写械 (褋 蟹邪写械褉卸泻芯泄)
let debounceTimer;
document.getElementById('input').addEventListener('input', () => {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(translateText, 300);
});

updateStatus();
</script>
